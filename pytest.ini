[pytest]
testpaths = tests/python
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    smoke: Smoke tests (instant)
    unit: Unit tests (< 1 second)
    integration: Integration tests (< 10 seconds)
    e2e: End-to-end tests (builds, runs binaries)
    slow: Slow tests (marked as slow)
